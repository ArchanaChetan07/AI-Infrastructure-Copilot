version: "3.9"

services:
  gpu-copilot:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - USE_MOCK_DATA=true
      - FIXTURES_DIR=fixtures
    volumes:
      - ./fixtures:/app/fixtures:ro
    restart: unless-stopped

