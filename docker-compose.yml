version: "3.9"

services:
  gpu-copilot:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - USE_MOCK_DATA=true
      - FIXTURES_DIR=fixtures
      # Day 2: enable these when running with full stack
      - QDRANT_ENABLED=${QDRANT_ENABLED:-false}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - POSTGRES_ENABLED=${POSTGRES_ENABLED:-false}
      - POSTGRES_URL=postgresql+asyncpg://copilot:copilot@postgres:5432/gpu_copilot
      - SLACK_ENABLED=${SLACK_ENABLED:-false}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - SLACK_CHANNEL=${SLACK_CHANNEL:-#gpu-alerts}
    volumes:
      - ./fixtures:/app/fixtures:ro
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=copilot
      - POSTGRES_PASSWORD=copilot
      - POSTGRES_DB=gpu_copilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot -d gpu_copilot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qdrant_storage:
  postgres_data:
