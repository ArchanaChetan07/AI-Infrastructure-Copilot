# AI-generated remediation patch for incident: gpu_thermal_throttle_ecc
# Generated by GPU Copilot at 2024-01-15T14:30:00Z
# Root cause: GPU 2 uncorrectable ECC error + thermal throttle
# Node: gpu-node-03 | Cluster: gpu-cluster-prod-01

---
# Step 1: Cordon the node to prevent new workload scheduling
apiVersion: v1
kind: Node
metadata:
  name: gpu-node-03
  annotations:
    gpu-copilot/incident-id: "INC-2024-0115-001"
    gpu-copilot/reason: "GPU 2 ECC double-bit error - node cordoned for GPU reset"
    gpu-copilot/auto-generated: "true"
spec:
  unschedulable: true

---
# Step 2: Reschedule the vLLM pod with GPU 2 excluded
# This uses node affinity to avoid GPU 2 while the node is being repaired
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-inference
  namespace: ml-serving
spec:
  template:
    metadata:
      annotations:
        gpu-copilot/patch-reason: "Excluding GPU 2 due to ECC DBE error"
        gpu-copilot/patch-timestamp: "2024-01-15T14:30:00Z"
    spec:
      containers:
      - name: vllm-server
        resources:
          limits:
            nvidia.com/gpu: "3"        # reduced from 4: GPU 2 excluded
          requests:
            nvidia.com/gpu: "3"
        env:
        - name: CUDA_VISIBLE_DEVICES
          value: "0,1,3"              # explicitly exclude GPU 2
        - name: VLLM_TENSOR_PARALLEL_SIZE
          value: "3"                  # was 4, adjusted for 3 GPUs
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - gpu-node-03          # reschedule to healthy node if available

---
# Step 3: Create a one-off GPU reset job (runs nvidia-smi reset on GPU 2)
# Run after cordoning and draining workloads
apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-reset-node03-gpu2
  namespace: ml-infra
  labels:
    gpu-copilot/auto-generated: "true"
    gpu-copilot/incident: "INC-2024-0115-001"
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: gpu-node-03
      tolerations:
      - key: node.kubernetes.io/unschedulable
        operator: Exists
        effect: NoSchedule
      containers:
      - name: gpu-reset
        image: nvidia/cuda:12.2.0-base-ubuntu22.04
        securityContext:
          privileged: true
        command:
        - /bin/bash
        - -c
        - |
          echo "=== GPU Copilot: GPU Reset Job ==="
          echo "Draining GPU 2..."
          nvidia-smi --id=2 --query-gpu=gpu_name,temperature.gpu,ecc.errors.uncorrected.aggregate.total --format=csv
          echo "Resetting GPU 2 ECC errors..."
          nvidia-smi --id=2 --ecc-config=1
          nvidia-smi --id=2 --gpu-reset || echo "Reset requires driver reload - flagging for manual intervention"
          echo "Post-reset health check..."
          nvidia-smi --id=2 --query-gpu=ecc.errors.uncorrected.aggregate.total,temperature.gpu,clocks.sm --format=csv,noheader
          echo "Done. GPU reset complete."
        resources:
          limits:
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: dev
          mountPath: /dev
      volumes:
      - name: dev
        hostPath:
          path: /dev

---
# Step 4: PodDisruptionBudget — ensure at least 1 vLLM replica stays up during remediation
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vllm-inference-pdb
  namespace: ml-serving
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: vllm-inference
